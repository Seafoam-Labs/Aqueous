# =============================================================================
# Aqueous WM — example config
# Path: ~/.config/aqueous/wm.toml
# Parser is a tiny TOML subset: [section], [[output]], key = value, # comments.
# Unknown keys are ignored; a malformed file falls back to defaults silently.
# =============================================================================

[layout]
# Global default layout id. One of: tile | monocle | grid | float | scrolling
default       = "tile"

# Gaps (px). Outer = around the screen edge; inner = between tiles.
gaps_outer    = 8        # default 8
gaps_inner    = 4        # default 4

# Master/stack split for the `tile` engine.
master_ratio  = 0.55     # default 0.55  (0.0–1.0)
master_count  = 1        # default 1     (windows in master area)

# Borders (ARGB hex, 0xAARRGGBB).
border_width   = 2
border_focused = 0xFF88C0D0   # Nord frost
border_normal  = 0xFF3B4252   # Nord polar night
border_urgent  = 0xFFBF616Au  # Nord aurora red


# -----------------------------------------------------------------------------
# Layout slots — symbolic names you can later bind keys to (Super+t/f/m/g
# wiring is deferred to phase B1c, but the slot table is already parsed).
# -----------------------------------------------------------------------------
[layout.slots]
primary    = "tile"
secondary  = "scrolling"
tertiary   = "monocle"
quaternary = "grid"


# -----------------------------------------------------------------------------
# Per-layout option overrides. Section name pattern: [layout.options.<id>]
# Recognised scalar keys: gaps_outer, gaps_inner, master_ratio, master_count.
# Anything else lands in LayoutOptions.Extra (string→string) for the engine.
# -----------------------------------------------------------------------------
[layout.options.tile]
gaps_outer   = 12
gaps_inner   = 6
master_ratio = 0.6

[layout.options.grid]
gaps_inner = 8

[layout.options.scrolling]
# PaperWM-style knobs consumed by ScrollingLayout via Extra:
column_fraction = "0.5"     # each column = 50% of output width
center_focused  = "true"    # auto-pan so focused column is centred

[layout.options.float]
# Floating engine has no scalar knobs today; reserved for future use.


# -----------------------------------------------------------------------------
# Per-output overrides. Repeat the [[output]] block once per monitor.
# `name` matches river_output_v1.name (e.g. "DP-1", "HDMI-A-1", "eDP-1").
# -----------------------------------------------------------------------------
[[output]]
name   = "DP-1"
layout = "scrolling"

[[output]]
name   = "HDMI-A-1"
layout = "tile"

[[output]]
name   = "eDP-1"
layout = "monocle"


# -----------------------------------------------------------------------------
# Keybindings.
#
# Each built-in action maps to either:
#   - a single chord string:   action = "Super+H"
#   - a list of chords:        action = ["Super+H", "Alt+Left"]
#   - an empty list to unbind: action = []
#
# Chord grammar: tokens joined by '+', case-insensitive.
#   Modifiers: Super (Mod4) | Ctrl | Alt (Mod1) | Shift
#   Keys:      single letters (A–Z), digits (0–9), F1–F24,
#              named keys (Return, Space, Tab, Comma, Period, Escape,
#              Left, Right, Up, Down, Home, End, PageUp, PageDown, ...)
#
# Omit any line to keep the compiled-in default (shown in the comment).
# -----------------------------------------------------------------------------
[keybinds]
# --- Window / session ---
toggle_start_menu     = "Super+Space"      # default
spawn_terminal        = "Super+Return"     # default
close_focused         = "Super+Q"          # default
cycle_focus           = "Super+Tab"        # default

# --- Directional focus (works in tile/grid; scrolling = prev/next column) ---
focus_left            = "Super+H"          # default
focus_right           = "Super+L"          # default
focus_up              = "Super+K"          # default
focus_down            = "Super+J"          # default

# --- Scrolling-layout viewport pan + column move ---
scroll_viewport_left  = "Super+Comma"      # default
scroll_viewport_right = "Super+Period"     # default
move_column_left      = "Super+Shift+H"    # default
move_column_right     = "Super+Shift+L"    # default

# --- Opt-in actions (no default chord) ---
reload_config         = "Super+R"          # re-read this file (layout opts hot-swap;
                                           # chord changes still need WM restart)

# Layout-switch sugar: resolves through [layout.slots] above.
set_layout_primary    = "Super+T"          # → tile
set_layout_secondary  = "Super+F"          # → scrolling
set_layout_tertiary   = "Super+M"          # → monocle
set_layout_quaternary = "Super+G"          # → grid

# Examples of the array form and explicit unbind:
#   cycle_focus = ["Super+Tab", "Alt+Tab"]
#   close_focused = []                      # disables Super+Q entirely


# -----------------------------------------------------------------------------
# Free-form custom chords. Key = chord string, value = action verb.
#
# Action verbs:
#   spawn:<argv>            — fork/exec via /bin/sh -c (detached)
#   set_layout:<id-or-slot> — switch active layout; <id> ∈ tile|monocle|grid|
#                             float|scrolling, or a [layout.slots] name
#   builtin:<action_name>   — invoke a built-in by canonical name
# -----------------------------------------------------------------------------
[keybinds.custom]
"Super+E"            = "spawn:nautilus"
"Super+Shift+S"      = "spawn:grim -g \"$(slurp)\" - | wl-copy"
"Super+B"            = "spawn:firefox"

# Direct layout switches (bypassing slots):
"Super+1"            = "set_layout:tile"
"Super+2"            = "set_layout:scrolling"
"Super+3"            = "set_layout:monocle"
"Super+4"            = "set_layout:grid"
"Super+5"            = "set_layout:float"

# Re-route a built-in onto an extra chord:
"Alt+F4"             = "builtin:close_focused"