# =============================================================================
# Aqueous WM — example config
# Path: ~/.config/aqueous/wm.toml
# Parser is a tiny TOML subset: [section], [[output]], key = value, # comments.
# Unknown keys are ignored; a malformed file falls back to defaults silently.
# =============================================================================

[layout]
# Global default layout id. One of: tile | monocle | grid | float | scrolling
default       = "float"

# Gaps (px). Outer = around the screen edge; inner = between tiles.
gaps_outer    = 8        # default 8
gaps_inner    = 4        # default 4

# Master/stack split for the `tile` engine.
master_ratio  = 0.55     # default 0.55  (0.0–1.0)
master_count  = 1        # default 1     (windows in master area)

# Borders (ARGB hex, 0xAARRGGBB).
border_width   = 2
border_focused = 0xFF88C0D0   # Nord frost
border_normal  = 0xFF3B4252   # Nord polar night
border_urgent  = 0xFFBF616Au  # Nord aurora red


# -----------------------------------------------------------------------------
# Layout slots — symbolic names you can later bind keys to (Super+t/f/m/g
# wiring is deferred to phase B1c, but the slot table is already parsed).
# -----------------------------------------------------------------------------
[layout.slots]
primary    = "tile"
secondary  = "scrolling"
tertiary   = "monocle"
quaternary = "grid"


# -----------------------------------------------------------------------------
# Per-layout option overrides. Section name pattern: [layout.options.<id>]
# Recognised scalar keys: gaps_outer, gaps_inner, master_ratio, master_count.
# Anything else lands in LayoutOptions.Extra (string→string) for the engine.
# -----------------------------------------------------------------------------
[layout.options.tile]
gaps_outer   = 12
gaps_inner   = 6
master_ratio = 0.6

[layout.options.grid]
gaps_inner = 8

[layout.options.scrolling]
# PaperWM-style knobs consumed by ScrollingLayout via Extra:
column_fraction = "0.5"     # each column = 50% of output width
center_focused  = "true"    # auto-pan so focused column is centred

[layout.options.float]
# Floating engine has no scalar knobs today; reserved for future use.


# -----------------------------------------------------------------------------
# Per-output overrides. Repeat the [[output]] block once per monitor.
#
# `name` matches river_output_v1.name (e.g. "DP-1", "HDMI-A-1", "eDP-1").
# `edid` (optional) is the SHA-256 of make|model|serial as reported by
#        `wlr-randr --json`; preferred over `name` because connector
#        names shuffle between boots and dock states.
#
# Display fields (mode/scale/transform/position/enabled/adaptive_sync)
# are applied by `aqueous-outputd`, NOT by Aqueous itself — River 0.4
# exposes no in-process output-management protocol to a WM client, so
# the daemon (running inside River's `-c` control context) calls
# `wlr-randr` for us. The init wrapper /usr/bin/aqueous-init applies
# these once before Aqueous draws its first frame, fixing the greetd
# render-size handoff.
#
# Schema:
#   name          = "DP-1"            connector name (or "*" wildcard)
#   edid          = "sha256:..."      preferred matcher; survives replug
#   layout        = "scrolling"       Aqueous layout id (existing field)
#   enabled       = true              false → wlr-randr --output X --off
#   mode          = "1920x1080@60"    "WIDTHxHEIGHT[@RATE]"
#   scale         = 1.25              0.5 – 3.0; fractional allowed
#   transform     = "normal"          normal | 90 | 180 | 270 |
#                                     flipped | flipped-90 | flipped-180 |
#                                     flipped-270
#   position      = [0, 0]            [x, y] in layout coords
#   adaptive_sync = false             VRR; only honoured if advertised
#   primary       = false             at most one output may set this
# -----------------------------------------------------------------------------
#[[output]]
#name   = "DP-1"
#layout = "scrolling"
#mode   = "2560x1440@144"
#scale  = 1.0
#position = [0, 0]
#
#[[output]]
#name    = "HDMI-A-1"
#layout  = "tile"
#mode    = "1920x1080@60"
#scale   = 1.0
#position = [2560, 0]
#
#[[output]]
#name    = "eDP-1"
#layout  = "monocle"
#scale   = 1.5
#enabled = true

[struts]
top    = 32   # Noctalia bar height
bottom = 0
left   = 0
right  = 0
# -----------------------------------------------------------------------------
# Display-side global behaviour. Consumed by `aqueous-outputd` —
# Aqueous itself only forwards these to the daemon.
# -----------------------------------------------------------------------------
#[display]
#apply_on_start   = true       # apply [[output]] block before Aqueous draws
#apply_on_reload  = true       # re-apply on Super+R
#fallback_profile = "safe"     # name of a [[display.profile]] used if apply fails
#identify_by      = "edid"     # "edid" | "name"
#rollback_seconds = 15         # GNOME-style "keep these settings?" timeout; 0 disables


# -----------------------------------------------------------------------------
# Named display profiles — bind to a chord via [keybinds.custom] using the
# "builtin:display_profile:<name>" verb (handled by aqueous-outputd's
# `apply_profile` op).
# -----------------------------------------------------------------------------
#[[display.profile]]
#name = "docked"
#
#[[display.profile.output]]
#name     = "DP-1"
#mode     = "3840x2160@60"
#scale    = 1.5
#position = [0, 0]
#
#[[display.profile.output]]
#name    = "eDP-1"
#enabled = false
#
#[[display.profile]]
#name = "safe"
#
#[[display.profile.output]]
#name  = "*"
#mode  = "1920x1080@60"
#scale = 1.0


# -----------------------------------------------------------------------------
# Autostart — supervised commands that Aqueous launches itself, after River
# has advertised all its globals (so layer-shell clients like the bar can
# attach successfully on first connect).
#
# Schema (one [[exec]] table per command):
#   name    = "id"           required — identifier used in logs / IPC
#   command = "sh command"   required — passed to /bin/sh -c, detached via setsid
#   when    = "startup"      "startup" (default) | "reload" | "always"
#   once    = true           don't relaunch on --reload
#   restart = false          respawn (with backoff) on non-zero exit
#   log     = "/tmp/x.log"   redirect stdout+stderr; default = /dev/null
#   env     = { K = "v" }    per-entry env overrides
# -----------------------------------------------------------------------------
[[exec]]
name    = "noctalia"
command = "qs -c noctalia-shell"
when    = "startup"
once    = true
restart = false
log     = "/tmp/noctalia.log"

# Additional examples:
# [[exec]]
# name    = "wallpaper"
# command = "swaybg -i ~/Pictures/wall.png -m fill"
#
# [[exec]]
# name    = "polkit"
# command = "/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1"
# when    = "always"
# restart = true


# -----------------------------------------------------------------------------
# Keybindings.
#
# Each built-in action maps to either:
#   - a single chord string:   action = "Super+H"
#   - a list of chords:        action = ["Super+H", "Alt+Left"]
#   - an empty list to unbind: action = []
#
# Chord grammar: tokens joined by '+', case-insensitive.
#   Modifiers: Super (Mod4) | Ctrl | Alt (Mod1) | Shift
#   Keys:      single letters (A–Z), digits (0–9), F1–F24,
#              named keys (Return, Space, Tab, Comma, Period, Escape,
#              Left, Right, Up, Down, Home, End, PageUp, PageDown, ...)
#
# Omit any line to keep the compiled-in default (shown in the comment).
# -----------------------------------------------------------------------------
[keybinds]
# --- Window / session ---
toggle_start_menu     = "Super+Space"      # default
spawn_terminal        = "Super+Return"     # default
close_focused         = "Super+Q"          # default
cycle_focus           = "Super+Tab"        # default

# --- Directional focus (works in tile/grid; scrolling = prev/next column) ---
focus_left            = "Super+H"          # default
focus_right           = "Super+L"          # default
focus_up              = "Super+K"          # default
focus_down            = "Super+J"          # default

# --- Scrolling-layout viewport pan + column move ---
scroll_viewport_left  = "Super+Comma"      # default
scroll_viewport_right = "Super+Period"     # default
move_column_left      = "Super+Shift+H"    # default
move_column_right     = "Super+Shift+L"    # default

# --- Opt-in actions (no default chord) ---
reload_config         = "Super+R"          # re-read this file (layout opts hot-swap;
                                           # chord changes still need WM restart)

# Layout-switch sugar: resolves through [layout.slots] above.
set_layout_primary    = "Super+T"          # → tile
set_layout_secondary  = "Super+F"          # → scrolling
set_layout_tertiary   = "Super+M"          # → monocle
set_layout_quaternary = "Super+G"          # → grid

# --- Tags / workspaces (Phase B1c) ---
# Tags are a per-output 32-bit bitmask. A window is visible on its output iff
# (window.tags & output.visible_tags) != 0. Bits 1..9 map to digits 1..9;
# the "all" actions use the full mask 0xFFFFFFFF (sticky / show-everything).
#
# View: switch the focused output's visible tagset to exactly this tag.
view_tag_1            = "Super+1"          # default
view_tag_2            = "Super+2"          # default
view_tag_3            = "Super+3"          # default
view_tag_4            = "Super+4"          # default
view_tag_5            = "Super+5"          # default
view_tag_6            = "Super+6"          # default
view_tag_7            = "Super+7"          # default
view_tag_8            = "Super+8"          # default
view_tag_9            = "Super+9"          # default
view_tag_all          = "Super+0"          # default — show every tag

# Send: reassign the focused window to exactly this tag (moves it).
send_tag_1            = "Super+Shift+1"    # default
send_tag_2            = "Super+Shift+2"    # default
send_tag_3            = "Super+Shift+3"    # default
send_tag_4            = "Super+Shift+4"    # default
send_tag_5            = "Super+Shift+5"    # default
send_tag_6            = "Super+Shift+6"    # default
send_tag_7            = "Super+Shift+7"    # default
send_tag_8            = "Super+Shift+8"    # default
send_tag_9            = "Super+Shift+9"    # default
send_tag_all          = "Super+Shift+0"    # default — make focused sticky

# Toggle view: add/remove this tag from the output's visible mask (union view).
toggle_view_tag_1     = "Super+Ctrl+1"     # default
toggle_view_tag_2     = "Super+Ctrl+2"     # default
toggle_view_tag_3     = "Super+Ctrl+3"     # default
toggle_view_tag_4     = "Super+Ctrl+4"     # default
toggle_view_tag_5     = "Super+Ctrl+5"     # default
toggle_view_tag_6     = "Super+Ctrl+6"     # default
toggle_view_tag_7     = "Super+Ctrl+7"     # default
toggle_view_tag_8     = "Super+Ctrl+8"     # default
toggle_view_tag_9     = "Super+Ctrl+9"     # default

# Toggle window tag: add/remove this tag from the focused window's mask
# (a window can live on multiple tags simultaneously).
toggle_window_tag_1   = "Super+Shift+Ctrl+1"   # default
toggle_window_tag_2   = "Super+Shift+Ctrl+2"   # default
toggle_window_tag_3   = "Super+Shift+Ctrl+3"   # default
toggle_window_tag_4   = "Super+Shift+Ctrl+4"   # default
toggle_window_tag_5   = "Super+Shift+Ctrl+5"   # default
toggle_window_tag_6   = "Super+Shift+Ctrl+6"   # default
toggle_window_tag_7   = "Super+Shift+Ctrl+7"   # default
toggle_window_tag_8   = "Super+Shift+Ctrl+8"   # default
toggle_window_tag_9   = "Super+Shift+Ctrl+9"   # default

# Back-and-forth between the current and previous tagset on this output.
swap_last_tagset      = "Super+grave"      # default (the ` key)

# --- Window state ops (Phase B1e) ---
# Fullscreen / Maximize / Floating / Minimize / Scratchpad. Each toggle
# remembers the prior state so a second press round-trips. Only ONE
# fullscreen window per output is allowed (toggling another auto-restores
# the prior). Minimized windows are excluded from layout + focus cycle.
toggle_fullscreen     = "Super+Shift+F"        # default
toggle_maximize       = "Super+Shift+M"        # default
toggle_floating       = "Super+Shift+Space"    # default
toggle_minimize       = "Super+N"              # default — hide from layout
unminimize_last       = "Super+Shift+N"        # default — restore most-recent minimized
toggle_scratchpad     = "Super+Backslash"      # default — summon/dismiss "default" pad
send_to_scratchpad    = "Super+Shift+Backslash" # default — park focused in "default" pad

# Examples of the array form and explicit unbind:
#   cycle_focus = ["Super+Tab", "Alt+Tab"]
#   close_focused = []                      # disables Super+Q entirely


# -----------------------------------------------------------------------------
# Free-form custom chords. Key = chord string, value = action verb.
#
# Action verbs:
#   spawn:<argv>            — fork/exec via /bin/sh -c (detached)
#   set_layout:<id-or-slot> — switch active layout; <id> ∈ tile|monocle|grid|
#                             float|scrolling, or a [layout.slots] name
#   builtin:<action_name>   — invoke a built-in by canonical name
# -----------------------------------------------------------------------------
[keybinds.custom]
"Super+E"            = "spawn:nemo"
"Super+Shift+S"      = "spawn:grim -g \"$(slurp)\" - | wl-copy"
"Super+B"            = "spawn:firefox"

# Direct layout switches (bypassing slots).
# NOTE: Super+1..5 are reserved by the tag bindings above (view_tag_1..5).
# Use the [layout.slots]-based set_layout_primary/secondary/... built-ins
# (Super+T/F/M/G) instead, or pick non-conflicting chords. Examples:
# "Super+Alt+T"        = "set_layout:tile"
# "Super+Alt+S"        = "set_layout:scrolling"
# "Super+Alt+M"        = "set_layout:monocle"
# "Super+Alt+G"        = "set_layout:grid"
# "Super+Alt+F"        = "set_layout:float"

# Re-route a built-in onto an extra chord:
"Alt+F4"             = "builtin:close_focused"

# Named scratchpads use a "verb:arg" suffix on the builtin: form. The
# pad name is created on first use; multiple pads can coexist.
# "Super+grave"        = "builtin:toggle_scratchpad_named:term"
# "Super+Shift+grave"  = "builtin:send_to_scratchpad_named:term"


# -----------------------------------------------------------------------------
# Window-state behaviour (Phase B1e). Controls fullscreen / maximize / float /
# minimize / scratchpad semantics. All keys are optional — defaults shown.
# -----------------------------------------------------------------------------
[state]
# When toggling fullscreen, also hide layer-shell layers above 'bottom'
# (the bar / notifications). NOTE: the layer-shell hide path is wired in
# Phase B1f; until then this flag is parsed but has no effect.
fullscreen_hides_bar = true

# Maximize ignores layer-shell exclusive zones (i.e. covers the bar).
# false → cover usable_area only (the conventional behaviour).
maximize_full_output = false


# -----------------------------------------------------------------------------
# Scratchpad geometry + spawn-on-empty policy.
# -----------------------------------------------------------------------------
[scratchpad]
# Behaviour when toggle_scratchpad fires on an empty pad:
#   "manual" — no-op; the pad is filled only via send_to_scratchpad
#   "spawn"  — run the configured [scratchpad.spawn.<name>] command and
#              claim its first window on manage_start
on_empty    = "manual"

# Geometry of a summoned scratchpad window, as fractions of the output's
# usable area. Anchor is one of: "center", "top", "bottom".
width_frac  = 0.6
height_frac = 0.5
anchor      = "center"

# pad-name → shell command. Run when on_empty = "spawn" and the pad is empty.
[scratchpad.spawn]
# term  = "ghostty --class=aqueous-scratch-term"
# notes = "obsidian"


# -----------------------------------------------------------------------------
# Input / focus policy.
# -----------------------------------------------------------------------------
[input]
# Sloppy focus: when true (default), moving the pointer over a window
# transfers keyboard focus to it. When false, focus only changes via
# click, keybind, or directional focus (Super+H/J/K/L).
focus_follows_mouse = false

# -----------------------------------------------------------------------------
# Pointer drag bindings (hardcoded; documented here for reference).
#
# River draws no decorations and does not implement server-side decorations,
# so undecorated clients (alacritty, foot, …) and CSD apps without libdecor
# cannot initiate resize/move on their own. Aqueous therefore binds the
# primary modifier (Super, see Mods.PrimaryMask) + mouse button as a
# WM-driven drag, i3/sway-style:
#
#   Super + BTN_LEFT  drag → move the floating window under the pointer
#   Super + BTN_RIGHT drag → resize the floating window; the edge is
#                            derived from the pointer's quadrant inside
#                            the window rect (top=1/bottom=2/left=4/right=8;
#                            center third falls back to the SE corner).
#
# Both gestures are gated on the dragged window's output running the
# `float` layout — in tile/scrolling/monocle/grid the gesture is ignored
# cleanly. Switch the output to float (or set [layout].default = "float")
# to enable. Requires `river_window_manager_v1` >= 4.
# -----------------------------------------------------------------------------

# Legacy flat keys (still honoured). Prefer [input.mouse] below for
# fine-grained control; these map onto Mouse.accel-profile / accel-speed
# when the per-device sub-table is omitted.
# pointer_acceleration        = true   # true=adaptive, false=flat
# pointer_acceleration_factor = 0.0    # libinput speed in [-1.0, 1.0]


# -----------------------------------------------------------------------------
# Per-device libinput configuration (niri-compatible schema).
#
# River 0.4 owns libinput but exposes no API for a WM client to configure
# it, so Aqueous forwards these to `aqueous-inputd` over a Unix socket
# at $XDG_RUNTIME_DIR/aqueous-inputd.sock. The daemon owns its own
# libinput context and applies values on device-add and on every config
# reload (live, no relog).
#
# Start the daemon once:
#   systemctl --user enable --now aqueous-inputd
# (or run /usr/bin/aqueous-inputd directly). The user must be in the
# `input` group, or replace the daemon's open_restricted with logind.
# -----------------------------------------------------------------------------
[input.mouse]
# accel_profile = "flat"   # "adaptive" | "flat"
# accel_speed   = 0.0          # [-1.0, 1.0]; 0.0 = libinput neutral
# natural_scroll = false
# left_handed   = false
# middle_emulation = false

[input.touchpad]
# accel_profile  = "flat"
# accel_speed    = 0.0
# tap            = true
# dwt            = true
# natural_scroll = true
# click_method   = "clickfinger"   # "clickfinger" | "button-areas"
# scroll_method  = "two-finger"    # "two-finger" | "edge" | "no-scroll"

[input.trackpoint]
# accel_profile = "flat"
# accel_speed   = 0.0


# -----------------------------------------------------------------------------
# SnapZones (KWin KZones / Windows FancyZones equivalent).
#
# A user-defined grid of rectangles per output that floating windows snap
# into when a Super+BTN_LEFT drag is released. Zones are declared in
# normalized output coordinates ([0.0, 1.0] on each axis), so the same
# config survives resolution changes and HiDPI scaling.
#
# Activation:
#   * Drag a floating window with Super+BTN_LEFT (the existing move drag).
#   * On release, if the pointer is inside a zone for the window's output,
#     the window snaps to that zone's resolved rectangle.
#   * Resize-drags (Super+BTN_RIGHT) are never snapped.
#   * The float-layout gate still applies: snapping only happens on
#     outputs running the `float` layout (or with a per-window Floating
#     override). Non-floating windows are not snapped.
#
# Schema:
#   [[snapzones]]                           # one bucket per (output, layout)
#   output    = "DP-1"                      # river_output_v1.name; "*" = any
#   layout    = "default"                   # optional name (KZones-style)
#   activator = "Shift"                     # optional modifier gate (KZones-style):
#                                           #   "always" / "none" / omitted = snap on
#                                           #     any Super+LMB drag (default)
#                                           #   "Shift" / "Ctrl" / "Alt" / "Super"
#                                           #     = snap only when that extra modifier
#                                           #     is held *at the moment the drag
#                                           #     starts* (in addition to Super).
#                                           # Internally Aqueous registers an extra
#                                           # Super+<activator>+BTN_LEFT pointer
#                                           # binding for each distinct activator
#                                           # value declared here, so live mid-drag
#                                           # mod release does not cancel snapping.
#
#   [[snapzones.zone]]                      # repeat for each zone
#   name = "left-half"
#   x = 0.0    # ∈ [0.0, 1.0]; out-of-range values are clamped
#   y = 0.0
#   w = 0.5
#   h = 1.0
#
# An output-specific bucket wins over the wildcard "*" — they are not
# concatenated. Zone overlap is permitted; the first match in declaration
# order wins. Zones smaller than a window's min_size are refused
# (the window stays where it was dropped).
#
# Examples — uncomment to try:

# [[snapzones]]
# output = "*"
# layout = "halves"
#
# [[snapzones.zone]]
# name = "left-half"
# x = 0.0
# y = 0.0
# w = 0.5
# h = 1.0
#
# [[snapzones.zone]]
# name = "right-half"
# x = 0.5
# y = 0.0
# w = 0.5
# h = 1.0


# Thirds layout — three vertical columns:
# [[snapzones]]
# output = "DP-1"
# layout = "thirds"
#
# [[snapzones.zone]]
# name = "left"
# x = 0.0
# y = 0.0
# w = 0.3333
# h = 1.0
#
# [[snapzones.zone]]
# name = "center"
# x = 0.3333
# y = 0.0
# w = 0.3334
# h = 1.0
#
# [[snapzones.zone]]
# name = "right"
# x = 0.6667
# y = 0.0
# w = 0.3333
# h = 1.0
